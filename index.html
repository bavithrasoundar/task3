<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Mark List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f5f5;
}

.main-container{
    margin-top:30px;
    border:3px solid black;
    padding:15px;
}

.left-box,
.right-box{
    border:3px solid black;
    padding:20px;
    background:white;
}

.left-box{
    min-height:620px;
}

.right-box{
    min-height:620px;
}

.form-control{
    margin-bottom:18px;
}

table{
    white-space:nowrap;
}

@media(max-width:991px){

.left-box,
.right-box{
    min-height:auto;
}

.main-container{
    margin:10px;
}

.btn{
    width:100%;
}

table{
    font-size:13px;
}

}

</style>

</head>
<body>

<div class="container-fluid">

<div class="main-container">

<div class="row g-4">

<!-- Left Side -->

<div class="col-12 col-lg-4">

<div class="left-box">

<h3 class="text-center mb-4">Student Form</h3>

<input type="text" class="form-control" id="name" placeholder="Enter Name">

<input type="number" class="form-control" id="roll" placeholder="Enter Roll Number">

<input type="number" class="form-control" id="maths" placeholder="Maths Mark">

<input type="number" class="form-control" id="science" placeholder="Science Mark">

<input type="number" class="form-control" id="english" placeholder="English Mark">

<input type="number" class="form-control" id="tamil" placeholder="Tamil Mark">

<div class="text-end">
<button class="btn btn-primary" onclick="addStudent()">Submit</button>
</div>

</div>

</div>

<!-- Right Side -->

<div class="col-12 col-lg-8">

<div class="right-box">

<h3 class="text-center mb-4">Student Information</h3>

<div class="table-responsive">

<table class="table table-bordered table-hover text-center align-middle">

<thead class="table-dark">

<tr>

<th>Name</th>
<th>Roll No</th>
<th>Maths</th>
<th>Science</th>
<th>English</th>
<th>Tamil</th>
<th>Total</th>
<th>Grade</th>
<th>Result</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

function addStudent(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;

let maths=parseInt(document.getElementById("maths").value)||0;
let science=parseInt(document.getElementById("science").value)||0;
let english=parseInt(document.getElementById("english").value)||0;
let tamil=parseInt(document.getElementById("tamil").value)||0;

let total=maths+science+english+tamil;

let average=total/4;

let grade;

if(average>=90){
grade="A+";
}
else if(average>=80){
grade="A";
}
else if(average>=70){
grade="B";
}
else if(average>=60){
grade="C";
}
else if(average>=50){
grade="D";
}
else{
grade="F";
}

let result;

if(maths>=35 && science>=35 && english>=35 && tamil>=35){
result="Pass";
}
else{
result="Fail";
}

let row=`
<tr>
<td>${name}</td>
<td>${roll}</td>
<td>${maths}</td>
<td>${science}</td>
<td>${english}</td>
<td>${tamil}</td>
<td>${total}</td>
<td>${grade}</td>
<td>${result}</td>
</tr>
`;

document.getElementById("tableBody").innerHTML+=row;

document.getElementById("name").value="";
document.getElementById("roll").value="";
document.getElementById("maths").value="";
document.getElementById("science").value="";
document.getElementById("english").value="";
document.getElementById("tamil").value="";

}

</script>

</body>
</html>
